<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Talland-style T globe with bold stem">
  <!-- Blue globe -->
  <circle cx="32" cy="32" r="28" fill="#4D6AFD"/>

  <!-- Prominent white gridlines -->
  <g fill="none" stroke="white" stroke-width="2.5" opacity=".5" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="32" cy="32" rx="12" ry="26"/>
    <ellipse cx="32" cy="32" rx="26" ry="12"/>
    <line x1="6" y1="32" x2="58" y2="32"/>
  </g>

  <!-- Smaller Talland-style T with bold vertical stem -->
  <g fill="white">
    <!-- Top bar -->
    <rect x="18" y="20" width="28" height="6"/>
    <!-- Bolder stem -->
    <rect x="29" y="26" width="6" height="24"/>
  </g>
</svg>
