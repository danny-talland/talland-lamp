services:
  webserver:
    build:
      context: .
      dockerfile: bin/php/Dockerfile
    restart: "always"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./www:/var/www/html:rw
      - ./projects:/var/www/html/projects:rw
      - ./config/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
      - ./config/ssl:/etc/apache2/ssl/
      - ./config/vhosts:/etc/apache2/sites-enabled
      - ./logs/apache2:/var/log/apache2
      - ./logs/xdebug:/var/log/xdebug
    environment:
      XDEBUG_CONFIG: "client_host=host.docker.internal remote_port=9003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
  database:
    build:
      context: "./bin/mariadb"
    restart: "always"
    ports:
      - "3306:3306"
    volumes:
      - ./config/initdb:/docker-entrypoint-initdb.d
      - ./data/mysql:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/zz-custom.cnf:ro
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
  phpmyadmin:
    image: phpmyadmin
    restart: "always"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: root
      UPLOAD_LIMIT: 512M
      MEMORY_LIMIT: 512M
      PMA_CONTROLHOST: database
      PMA_CONTROLPORT: 3306
      PMA_CONTROLUSER: pma
      PMA_CONTROLPASS: pmapass
      PMA_PMADB: phpmyadmin
    ports:
      - "8080:80"
    volumes:
      - /sessions
      - ./config/php/php.ini:/usr/local/etc/php/conf.d/php-phpmyadmin.ini
