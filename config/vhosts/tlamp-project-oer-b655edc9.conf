# TLAMP_PROJECT=OER
<VirtualHost *:80>
    ServerName oer.local
    DocumentRoot /var/www/html/projects/OER

    <Directory /var/www/html/projects/OER>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/oer-error.log
    CustomLog ${APACHE_LOG_DIR}/oer-access.log combined
</VirtualHost>
